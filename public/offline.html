<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poiema Gestoque — Offline</title>
  <style>
    body { margin:0; background:#09090b; color:#fafafa; font-family:system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .container { padding:32px; }
    .icon { font-size:48px; margin-bottom:16px; }
    h1 { font-size:20px; font-weight:600; margin-bottom:8px; }
    p { font-size:14px; color:#71717a; margin-bottom:24px; }
    button { padding:10px 24px; background:#6366f1; color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📦</div>
    <h1>Você está offline</h1>
    <p>Verifique sua conexão e tente novamente.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
