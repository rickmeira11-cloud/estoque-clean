<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Estoque SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Inter; background:#0f172a; color:#e2e8f0; }
.hidden { display:none; }

.layout { display:flex; height:100vh; }

.sidebar {
  width:250px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.logo { font-size:18px; font-weight:bold; margin-bottom:20px; }

.menu button {
  width:100%;
  background:none;
  border:none;
  color:#cbd5f5;
  padding:10px;
  border-radius:8px;
  text-align:left;
  cursor:pointer;
}
.menu button:hover { background:#1e293b; }

.main { flex:1; display:flex; flex-direction:column; }

.header {
  height:60px;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid #1e293b;
}

.content { flex:1; padding:20px; overflow:auto; }

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input, select {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button.primary {
  background:#3b82f6;
  color:white;
}

table { width:100%; }
td, th { padding:10px; border-bottom:1px solid #334155; }

.low { color:#f87171; }
.ok { color:#22c55e; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button class="primary" onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="layout hidden">

  <div class="sidebar">
    <div class="logo" id="churchName">Sistema</div>

    <div class="menu">
      <button onclick="navigate('dashboard')">📊 Dashboard</button>
      <button onclick="navigate('products')">📦 Produtos</button>
      <button onclick="navigate('movements')">🔄 Movimentações</button>
      <button onclick="navigate('users')">👥 Usuários</button>
      <button onclick="navigate('church')">⚙️ Igreja</button>
    </div>

    <div style="margin-top:auto;">
      <button onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <div id="pageTitle">Dashboard</div>
      <div id="userEmail"></div>
    </div>

    <div class="content" id="content"></div>
  </div>

</div>

<script>
const client = supabase.createClient(
  "https://lggbgqqnguoacuilbugm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZ2JncXFuZ3VvYWN1aWxidWdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzU3OTMsImV4cCI6MjA5MTQxMTc5M30.ma9mvlD4hZhXJheFbxEG5c9jvJahZ2_PAh2rWZnCa8k"
);

let profile = null;
let editingId = null;

// LOGIN
async function login(){
  const { error } = await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  if(error) return alert(error.message);
  init();
}

// INIT
async function init(){
  const { data } = await client.auth.getUser();
  if(!data.user) return;

  const user = data.user;

  const { data: p } = await client
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .maybeSingle();

  profile = p;

  const { data: church } = await client
    .from('churches')
    .select('*')
    .eq('id', profile.church_id)
    .maybeSingle();

  churchName.innerText = church?.name || "Igreja";
  userEmail.innerText = user.email;

  showApp();
  navigate('dashboard');
}

// NAV
function navigate(page){
  pageTitle.innerText = page;

  if(page==='dashboard') dashboard();
  if(page==='products') loadProducts();
  if(page==='movements') loadMovements();
  if(page==='users') usersPage();
  if(page==='church') churchPage();
}

// DASHBOARD
async function dashboard(){
  const { data } = await client.from('products').select('*');

  const total = data.length;
  const low = data.filter(p=>p.quantity <= p.min_stock).length;

  content.innerHTML = `
  <div class="card">
    <h3>Resumo</h3>
    <p>Total: ${total}</p>
    <p>Baixo: ${low}</p>
  </div>
  <div class="card"><canvas id="chart"></canvas></div>
  `;

  new Chart(chart,{
    type:'bar',
    data:{ labels:['OK','Baixo'], datasets:[{data:[total-low, low]}] }
  });
}

// PRODUTOS
async function loadProducts(){
  const { data } = await client.from('products').select('*');

  let html = `
  <div class="card">
    <h3>${editingId?'Editar':'Novo'} Produto</h3>
    <input id="name" placeholder="Nome">
    <input id="qty" type="number" placeholder="Qtd">
    <input id="min" type="number" placeholder="Min">
    <button class="primary" onclick="saveProduct()">${editingId?'Atualizar':'Salvar'}</button>
    ${editingId?'<button onclick="cancelEdit()">Cancelar</button>':''}
  </div>

  <div class="card">
  <table>
  <tr><th>Nome</th><th>Qtd</th><th>Status</th><th>Ações</th></tr>
  `;

  data.forEach(p=>{
    const low = p.quantity <= p.min_stock;
    html+=`
    <tr>
      <td>${p.name}</td>
      <td>${p.quantity}</td>
      <td class="${low?'low':'ok'}">${low?'BAIXO':'OK'}</td>
      <td>
        <button onclick="editProduct('${p.id}','${p.name}',${p.quantity},${p.min_stock})">✏️</button>
        <button onclick="deleteProduct('${p.id}')">🗑️</button>
      </td>
    </tr>`;
  });

  html += "</table></div>";
  content.innerHTML = html;
}

async function saveProduct(){
  const payload={
    name:name.value,
    quantity:parseInt(qty.value)||0,
    min_stock:parseInt(min.value)||1,
    church_id:profile.church_id
  };

  if(editingId){
    await client.from('products').update(payload).eq('id',editingId);
  }else{
    await client.from('products').insert(payload);
  }

  clearForm();
  loadProducts();
}

function editProduct(id,n,q,m){
  editingId=id;
  name.value=n;
  qty.value=q;
  min.value=m;
}

function cancelEdit(){ clearForm(); }

function clearForm(){
  editingId=null;
  name.value=""; qty.value=""; min.value="";
}

async function deleteProduct(id){
  if(!confirm("Excluir?")) return;
  await client.from('products').delete().eq('id',id);
  loadProducts();
}

// MOVIMENTOS
async function loadMovements(){
  const { data: products } = await client.from('products').select('*');
  const { data: mov } = await client.from('stock_movements').select('*,products(name)');

  let html=`
  <div class="card">
    <select id="m_product">
      ${products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}
    </select>
    <select id="m_type">
      <option value="in">Entrada</option>
      <option value="out">Saída</option>
      <option value="adjustment">Ajuste</option>
    </select>
    <input id="m_qty" type="number">
    <button class="primary" onclick="createMovement()">Salvar</button>
  </div>

  <div class="card"><table>
  <tr><th>Produto</th><th>Tipo</th><th>Qtd</th></tr>
  `;

  mov.forEach(m=>{
    html+=`<tr>
      <td>${m.products?.name||''}</td>
      <td>${m.type}</td>
      <td>${m.quantity}</td>
    </tr>`;
  });

  html+="</table></div>";
  content.innerHTML=html;
}

async function createMovement(){
  const pid=m_product.value;
  const qty=parseInt(m_qty.value);

  await client.from('stock_movements').insert({
    product_id:pid,
    quantity:qty,
    type:m_type.value,
    church_id:profile.church_id
  });

  loadMovements();
}

// USERS
async function usersPage(){
  const { data } = await client.from('profiles').select('*');

  let html=`
  <div class="card">
    <input id="u_name" placeholder="Nome">
    <input id="u_email" placeholder="Email">
    <select id="u_role">
      <option value="operator">Operador</option>
      <option value="admin">Admin</option>
    </select>
    <button class="primary" onclick="createUser()">Criar</button>
  </div>

  <div class="card"><table>
  <tr><th>Nome</th><th>Email</th><th>Role</th></tr>
  `;

  data.forEach(u=>{
    html+=`<tr>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.role}</td>
    </tr>`;
  });

  html+="</table></div>";
  content.innerHTML=html;
}

async function createUser(){
  await client.from('profiles').insert({
    name:u_name.value,
    email:u_email.value,
    role:u_role.value,
    church_id:profile.church_id
  });

  usersPage();
}

// CHURCH
async function churchPage(){
  const { data } = await client
    .from('churches')
    .select('*')
    .eq('id',profile.church_id)
    .single();

  content.innerHTML=`
  <div class="card">
    <input id="c_name" value="${data.name}">
    <input id="c_city" value="${data.city||''}">
    <input id="c_state" value="${data.state||''}">
    <button class="primary" onclick="updateChurch('${data.id}')">Salvar</button>
  </div>`;
}

async function updateChurch(id){
  await client.from('churches').update({
    name:c_name.value,
    city:c_city.value,
    state:c_state.value
  }).eq('id',id);

  alert("Atualizado");
}

// HELPERS
function showApp(){
  loginScreen.classList.add('hidden');
  app.classList.remove('hidden');
}

async function logout(){
  await client.auth.signOut();
  location.reload();
}

init();
</script>

</body>
</html>
