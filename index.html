<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP SaaS Estoque</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Inter; background:#0f172a; color:#e2e8f0; }
.hidden { display:none; }
.layout { display:flex; height:100vh; }
.sidebar { width:250px; background:#020617; padding:20px; display:flex; flex-direction:column; }
.menu button { width:100%; background:none; border:none; color:#cbd5f5; padding:10px; border-radius:8px; text-align:left; cursor:pointer;}
.menu button:hover { background:#1e293b; }
.main { flex:1; display:flex; flex-direction:column; }
.header { height:60px; background:#020617; display:flex; justify-content:space-between; padding:0 20px; align-items:center;}
.content { flex:1; padding:20px; overflow:auto;}
.card { background:#1e293b; padding:15px; border-radius:12px; margin-bottom:15px;}
input,select { padding:10px; margin:5px; border-radius:8px; border:none;}
button.primary { background:#3b82f6; color:white;}
.low { color:#f87171;}
.ok { color:#22c55e;}
.alert { background:#7f1d1d; padding:10px; border-radius:8px; margin-bottom:10px;}
</style>
</head>

<body>

<div id="loginScreen" class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button class="primary" onclick="login()">Entrar</button>
</div>

<div id="app" class="layout hidden">
<div class="sidebar">
  <h3 id="churchName">ERP</h3>
  <div class="menu">
    <button onclick="nav('dashboard')">📊 Dashboard</button>
    <button onclick="nav('products')">📦 Produtos</button>
    <button onclick="nav('movements')">🔄 Movimentações</button>
    <button onclick="nav('users')">👥 Usuários</button>
    <button onclick="nav('church')">⚙️ Igreja</button>
  </div>
  <div style="margin-top:auto;">
    <button onclick="logout()">Sair</button>
  </div>
</div>

<div class="main">
<div class="header">
  <div id="pageTitle"></div>
  <div id="userEmail"></div>
</div>
<div id="content" class="content"></div>
</div>
</div>

<script>
const client = supabase.createClient("https://lggbgqqnguoacuilbugm.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZ2JncXFuZ3VvYWN1aWxidWdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzU3OTMsImV4cCI6MjA5MTQxMTc5M30.ma9mvlD4hZhXJheFbxEG5c9jvJahZ2_PAh2rWZnCa8k");
let profile=null;

// LOGIN
async function login(){
  const {error} = await client.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });
  if(error) return alert(error.message);
  init();
}

// INIT
async function init(){
  const {data} = await client.auth.getUser();
  if(!data.user) return;

  const {data: p} = await client.from('profiles')
    .select('*').eq('id', data.user.id).single();

  profile = p;

  const {data: church} = await client.from('churches')
    .select('*').eq('id', profile.church_id).single();

  churchName.innerText = church.name;
  userEmail.innerText = data.user.email;

  loginScreen.classList.add('hidden');
  app.classList.remove('hidden');

  nav('dashboard');
}

// NAV
function nav(page){
  pageTitle.innerText = page;
  if(page==='dashboard') dashboard();
  if(page==='products') products();
  if(page==='movements') movements();
  if(page==='users') users();
  if(page==='church') church();
}

// DASHBOARD COM ALERTAS
async function dashboard(){
  const {data} = await client.from('products').select('*');

  const low = data.filter(p=>p.quantity <= p.min_stock);
  const expiring = data.filter(p=>p.expiration_date && new Date(p.expiration_date) < new Date(Date.now()+7*86400000));

  let html="";

  if(low.length){
    html+=`<div class="alert">⚠️ ${low.length} produtos com estoque baixo</div>`;
  }

  if(expiring.length){
    html+=`<div class="alert">⏳ ${expiring.length} produtos próximos da validade</div>`;
  }

  html+=`
  <div class="card">
    <canvas id="chart"></canvas>
  </div>`;

  content.innerHTML = html;

  new Chart(chart,{
    type:'doughnut',
    data:{
      labels:['OK','Baixo'],
      datasets:[{data:[data.length-low.length, low.length]}]
    }
  });
}

// PRODUTOS
async function products(){
  const {data} = await client.from('products').select('*');

  let html=`
  <div class="card">
    <input id="name" placeholder="Nome">
    <input id="qty" type="number" placeholder="Qtd">
    <input id="min" type="number" placeholder="Min">
    <input id="exp" type="date">
    <button class="primary" onclick="saveProduct()">Salvar</button>
  </div>
  <div class="card">`;

  data.forEach(p=>{
    const low = p.quantity <= p.min_stock;
    html+=`
    <div>
      ${p.name} | ${p.quantity}
      <span class="${low?'low':'ok'}">${low?'BAIXO':'OK'}</span>
      <button onclick="del('${p.id}')">X</button>
    </div>`;
  });

  html+="</div>";
  content.innerHTML=html;
}

async function saveProduct(){
  await client.from('products').insert({
    name:name.value,
    quantity:qty.value,
    min_stock:min.value,
    expiration_date:exp.value,
    church_id:profile.church_id
  });
  products();
}

async function del(id){
  await client.from('products').delete().eq('id',id);
  products();
}

// MOVIMENTOS
async function movements(){
  const {data:productsList} = await client.from('products').select('*');

  let html=`
  <div class="card">
    <select id="p">
      ${productsList.map(p=>`<option value="${p.id}">${p.name}</option>`)}
    </select>
    <select id="t">
      <option value="in">Entrada</option>
      <option value="out">Saída</option>
    </select>
    <input id="q" type="number">
    <button class="primary" onclick="mov()">Salvar</button>
  </div>`;

  content.innerHTML=html;
}

async function mov(){
  const pid=p.value;
  const qty=parseInt(q.value);

  await client.from('stock_movements').insert({
    product_id:pid,
    quantity:qty,
    type:t.value,
    church_id:profile.church_id
  });

  // Atualiza estoque manualmente
  const {data:prod} = await client.from('products').select('*').eq('id',pid).single();

  let newQty = t.value==='in' ? prod.quantity+qty : prod.quantity-qty;

  await client.from('products').update({quantity:newQty}).eq('id',pid);

  alert("Movimentação registrada");
}

// USERS
async function users(){
  const {data} = await client.from('profiles').select('*');

  let html=`<div class="card">`;

  data.forEach(u=>{
    html+=`<div>${u.name} - ${u.role}</div>`;
  });

  html+="</div>";
  content.innerHTML=html;
}

// CHURCH
async function church(){
  const {data} = await client.from('churches').select('*').eq('id',profile.church_id).single();

  content.innerHTML=`
  <div class="card">
    <input id="cname" value="${data.name}">
    <button class="primary" onclick="saveChurch('${data.id}')">Salvar</button>
  </div>`;
}

async function saveChurch(id){
  await client.from('churches').update({name:cname.value}).eq('id',id);
  alert("Salvo");
}

// LOGOUT
async function logout(){
  await client.auth.signOut();
  location.reload();
}

init();
</script>

</body>
</html>
