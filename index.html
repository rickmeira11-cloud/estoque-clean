<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:Inter, Arial;
  background:#0f172a;
  color:#e2e8f0;
}

.hidden { display:none; }

/* LAYOUT */
.layout { display:flex; height:100vh; }

/* SIDEBAR */
.sidebar {
  width:250px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.logo {
  font-size:18px;
  font-weight:bold;
  margin-bottom:20px;
}

.menu button {
  width:100%;
  background:none;
  border:none;
  color:#cbd5f5;
  text-align:left;
  padding:10px;
  border-radius:8px;
  margin-bottom:5px;
  cursor:pointer;
}

.menu button:hover {
  background:#1e293b;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header {
  height:60px;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid #1e293b;
}

/* CONTENT */
.content {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* CARD */
.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

/* INPUT */
input {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button.primary {
  background:#3b82f6;
  color:white;
}

/* TABLE */
table { width:100%; }
td, th {
  padding:10px;
  border-bottom:1px solid #334155;
}

.low { color:#f87171; }
.ok { color:#22c55e; }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button class="primary" onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="layout hidden">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo" id="churchName">Sistema</div>

    <div class="menu">
      <button onclick="navigate('dashboard')">📊 Dashboard</button>

      <button onclick="navigate('products')">📦 Produtos</button>
      <button onclick="navigate('movements')">🔄 Movimentações</button>

      <button onclick="navigate('users')">👥 Usuários</button>
      <button onclick="navigate('settings')">⚙️ Configurações</button>
    </div>

    <div style="margin-top:auto;">
      <button onclick="logout()">Sair</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <div id="pageTitle">Dashboard</div>
      <div id="userEmail"></div>
    </div>

    <div class="content" id="content"></div>

  </div>

</div>

<script>
const SUPABASE_URL = "https://lggbgqqnguoacuilbugm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZ2JncXFuZ3VvYWN1aWxidWdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzU3OTMsImV4cCI6MjA5MTQxMTc5M30.ma9mvlD4hZhXJheFbxEG5c9jvJahZ2_PAh2rWZnCa8k";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let profile = null;

// LOGIN
async function login() {
  const { error } = await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (error) return alert(error.message);
  init();
}

// INIT
async function init() {
  const { data } = await client.auth.getUser();
  if (!data.user) return;

  const user = data.user;

  let { data: p } = await client
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .maybeSingle();

  profile = p;

  const { data: church } = await client
    .from('churches')
    .select('*')
    .eq('id', profile.church_id)
    .single();

  document.getElementById("churchName").innerText = church?.name || "Igreja";
  document.getElementById("userEmail").innerText = user.email;

  showApp();
  navigate('dashboard');
}

// NAVIGATION
function navigate(page) {
  document.getElementById("pageTitle").innerText = page;

  if (page === 'dashboard') dashboard();
  if (page === 'products') loadProducts();
  if (page === 'movements') loadMovements();
  if (page === 'users') usersPage();
  if (page === 'settings') settingsPage();
}

// DASHBOARD
async function dashboard() {
  const { data } = await client.from('products').select('*');

  const total = data.length;
  const low = data.filter(p => p.quantity <= p.min_stock).length;

  content.innerHTML = `
    <div class="card">
      <h3>Resumo</h3>
      <p>Total: ${total}</p>
      <p>Baixo: ${low}</p>
    </div>
    <div class="card">
      <canvas id="chart"></canvas>
    </div>
  `;

  new Chart(document.getElementById('chart'), {
    type:'bar',
    data:{
      labels:['OK','Baixo'],
      datasets:[{ data:[total-low, low] }]
    }
  });
}

// PRODUTOS
async function loadProducts() {
  const { data } = await client.from('products').select('*');

  let html = `
  <div class="card">
    <h3>Produtos</h3>

    <input id="name" placeholder="Nome">
    <input id="qty" type="number" placeholder="Qtd">
    <input id="min" type="number" placeholder="Min">

    <button class="primary" onclick="addProduct()">Adicionar</button>

    <table>
      <tr><th>Nome</th><th>Qtd</th><th>Status</th></tr>
  `;

  data.forEach(p=>{
    const low = p.quantity <= p.min_stock;
    html += `
      <tr>
        <td>${p.name}</td>
        <td>${p.quantity}</td>
        <td class="${low?'low':'ok'}">${low?'BAIXO':'OK'}</td>
      </tr>
    `;
  });

  html += "</table></div>";
  content.innerHTML = html;
}

// ADD
async function addProduct(){
  await client.from('products').insert({
    name: name.value,
    quantity: parseInt(qty.value)||0,
    min_stock: parseInt(min.value)||1,
    church_id: profile.church_id
  });

  loadProducts();
}

// MOVEMENTS
async function loadMovements(){
  content.innerHTML = "<div class='card'>Movimentações em breve</div>";
}

// USERS
function usersPage(){
  content.innerHTML = "<div class='card'>Gestão de usuários em breve</div>";
}

// SETTINGS
function settingsPage(){
  content.innerHTML = "<div class='card'>Configurações em breve</div>";
}

// HELPERS
function showApp(){
  loginScreen.classList.add('hidden');
  app.classList.remove('hidden');
}

// LOGOUT
async function logout(){
  await client.auth.signOut();
  location.reload();
}

init();
</script>

</body>
</html>
