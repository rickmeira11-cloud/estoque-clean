<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Estoque SaaS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .hidden { display: none; }

    .container { padding: 20px; }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .menu {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .menu button {
      background: #334155;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    td, th {
      padding: 8px;
      border-bottom: 1px solid #334155;
    }

    .danger {
      color: #f87171;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="container">
  <h2>Login</h2>
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Senha" />
  <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden container">

  <h2 id="churchName"></h2>

  <div class="menu">
    <button onclick="loadProducts()">Produtos</button>
    <button onclick="loadMovements()">Movimentações</button>
    <button onclick="logout()">Sair</button>
  </div>

  <div id="content"></div>

</div>

<script>
const SUPABASE_URL = "https://lggbgqqnguoacuilbugm.supabase.co";
const SUPABASE_KEY = "SUA_ANON_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let profile = null;

// ================= LOGIN =================
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await client.auth.signInWithPassword({ email, password });

  if (error) return alert(error.message);

  init();
}

// ================= INIT =================
async function init() {
  const { data } = await client.auth.getUser();

  if (!data.user) return;

  // busca profile
  let { data: p } = await client
    .from('profiles')
    .select('*')
    .eq('id', data.user.id)
    .single();

  profile = p;

  // pega igreja
  const { data: church } = await client
    .from('churches')
    .select('*')
    .eq('id', profile.church_id)
    .single();

  document.getElementById('churchName').innerText = church.name;

  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  loadProducts();
}

// ================= LOGOUT =================
async function logout() {
  await client.auth.signOut();
  location.reload();
}

// ================= PRODUTOS =================
async function loadProducts() {
  const { data } = await client
    .from('products')
    .select('*')
    .order('created_at', { ascending: false });

  let html = `
    <h3>Produtos</h3>

    <input id="name" placeholder="Nome" />
    <input id="qty" type="number" placeholder="Qtd" />
    <input id="min" type="number" placeholder="Mínimo" />

    <button onclick="addProduct()">Adicionar</button>

    <table>
      <tr>
        <th>Nome</th>
        <th>Qtd</th>
        <th>Status</th>
      </tr>
  `;

  data.forEach(p => {
    const low = p.quantity <= p.min_stock;

    html += `
      <tr>
        <td>${p.name}</td>
        <td>${p.quantity}</td>
        <td class="${low ? 'danger' : ''}">
          ${low ? 'BAIXO' : 'OK'}
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById('content').innerHTML = html;
}

// ================= ADD PRODUTO =================
async function addProduct() {
  const name = document.getElementById('name').value;
  const qty = parseInt(document.getElementById('qty').value);
  const min = parseInt(document.getElementById('min').value);

  await client.from('products').insert({
    name,
    quantity: qty,
    min_stock: min,
    church_id: profile.church_id
  });

  loadProducts();
}

// ================= MOVIMENTAÇÕES =================
async function loadMovements() {
  const { data } = await client
    .from('stock_movements')
    .select('*, products(name)')
    .order('created_at', { ascending: false })
    .limit(50);

  let html = `
    <h3>Movimentações</h3>

    <table>
      <tr>
        <th>Produto</th>
        <th>Tipo</th>
        <th>Qtd</th>
      </tr>
  `;

  data.forEach(m => {
    html += `
      <tr>
        <td>${m.products?.name || '-'}</td>
        <td>${m.type}</td>
        <td>${m.quantity}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById('content').innerHTML = html;
}

// ================= AUTO LOGIN =================
init();

</script>

</body>
</html>
