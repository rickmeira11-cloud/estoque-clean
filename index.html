<script>
const client = supabase.createClient("https://lggbgqqnguoacuilbugm.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZ2JncXFuZ3VvYWN1aWxidWdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzU3OTMsImV4cCI6MjA5MTQxMTc5M30.ma9mvlD4hZhXJheFbxEG5c9jvJahZ2_PAh2rWZnCa8k");
let profile=null;
let user=null;

// LOGIN
async function login(){
  const {error} = await client.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });
  if(error) return alert(error.message);
  init();
}

// INIT SEGURO
async function init(){
  const {data, error} = await client.auth.getUser();

  if(error || !data.user) return;

  user = data.user;

  const {data: p, error: errP} = await client
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single();

  if(errP || !p){
    console.error("Erro profile:", errP);
    alert("Usuário sem profile. Verifique o banco.");
    return;
  }

  profile = p;

  const {data: church, error: errC} = await client
    .from('churches')
    .select('*')
    .eq('id', profile.church_id)
    .single();

  if(errC || !church){
    console.error("Erro church:", errC);
    alert("Erro ao carregar igreja");
    return;
  }

  churchName.innerText = church.name;
  userEmail.innerText = user.email + " ("+profile.role+")";

  loginScreen.classList.add('hidden');
  app.classList.remove('hidden');

  nav('dashboard');
}

// NAV
function nav(page){
  pageTitle.innerText = page;
  if(page==='dashboard') dashboard();
  if(page==='products') products();
  if(page==='movements') movements();
  if(page==='users') users();
  if(page==='church') church();
}

// DASHBOARD
async function dashboard(){
  const {data, error} = await client.from('products').select('*');

  if(error){
    console.error(error);
    content.innerHTML = "Erro ao carregar dashboard";
    return;
  }

  const list = data || [];

  const low = list.filter(p=>p.quantity <= p.min_stock);
  const expiring = list.filter(p=>p.expiration_date && new Date(p.expiration_date) < new Date(Date.now()+7*86400000));

  let html="";

  if(low.length){
    html+=`<div class="alert">⚠️ ${low.length} estoque baixo</div>`;
  }

  if(expiring.length){
    html+=`<div class="alert">⏳ ${expiring.length} vencendo</div>`;
  }

  html+=`<div class="card"><canvas id="chart"></canvas></div>`;
  content.innerHTML = html;

  new Chart(chart,{
    type:'doughnut',
    data:{
      labels:['OK','Baixo'],
      datasets:[{data:[list.length-low.length, low.length]}]
    }
  });
}

// PRODUTOS
async function products(){
  const {data, error} = await client.from('products').select('*');

  if(error){
    console.error(error);
    content.innerHTML="Erro ao carregar produtos";
    return;
  }

  const list = data || [];

  let html=`
  <div class="card">
    <input id="name" placeholder="Nome">
    <input id="qty" type="number" placeholder="Qtd">
    <input id="min" type="number" placeholder="Min">
    <input id="exp" type="date">
    <button class="primary" onclick="saveProduct()">Salvar</button>
  </div>
  <div class="card">`;

  list.forEach(p=>{
    const low = p.quantity <= p.min_stock;

    html+=`
    <div>
      ${p.name} | ${p.quantity}
      <span class="${low?'low':'ok'}">${low?'BAIXO':'OK'}</span>
      ${profile.role==='admin' ? `<button onclick="del('${p.id}')">X</button>` : ''}
    </div>`;
  });

  html+="</div>";
  content.innerHTML=html;
}

// SAVE PRODUCT (SEM church_id)
async function saveProduct(){
  const {error} = await client.from('products').insert({
    name:name.value,
    quantity:parseInt(qty.value||0),
    min_stock:parseInt(min.value||1),
    expiration_date:exp.value || null
  });

  if(error){
    console.error(error);
    return alert("Erro ao salvar");
  }

  products();
}

// DELETE (SÓ ADMIN)
async function del(id){
  if(profile.role !== 'admin') return alert("Sem permissão");

  const {error} = await client.from('products').delete().eq('id',id);

  if(error){
    console.error(error);
    return alert("Erro ao deletar");
  }

  products();
}

// MOVIMENTOS
async function movements(){
  const {data, error} = await client.from('products').select('*');

  if(error){
    console.error(error);
    return content.innerHTML="Erro produtos";
  }

  const list = data || [];

  let html=`
  <div class="card">
    <select id="p">
      ${list.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}
    </select>
    <select id="t">
      <option value="in">Entrada</option>
      <option value="out">Saída</option>
    </select>
    <input id="q" type="number">
    <button class="primary" onclick="mov()">Salvar</button>
  </div>`;

  content.innerHTML=html;
}

async function mov(){
  const pid=p.value;
  const qtyVal=parseInt(q.value||0);

  const {error} = await client.from('stock_movements').insert({
    product_id:pid,
    quantity:qtyVal,
    type:t.value
  });

  if(error){
    console.error(error);
    return alert("Erro movimentação");
  }

  const {data:prod} = await client.from('products').select('*').eq('id',pid).single();

  let newQty = t.value==='in' ? prod.quantity+qtyVal : prod.quantity-qtyVal;

  await client.from('products').update({quantity:newQty}).eq('id',pid);

  alert("Movimentado");
}

// USERS (ADMIN)
async function users(){
  if(profile.role !== 'admin'){
    content.innerHTML="Sem permissão";
    return;
  }

  const {data, error} = await client.from('profiles').select('*');

  if(error){
    console.error(error);
    return content.innerHTML="Erro usuários";
  }

  const list = data || [];

  content.innerHTML = `
  <div class="card">
    ${list.map(u=>`<div>${u.name} - ${u.role}</div>`).join('')}
  </div>`;
}

// CHURCH
async function church(){
  const {data, error} = await client
    .from('churches')
    .select('*')
    .eq('id',profile.church_id)
    .single();

  if(error){
    console.error(error);
    return content.innerHTML="Erro igreja";
  }

  content.innerHTML=`
  <div class="card">
    <input id="cname" value="${data.name}">
    <button class="primary" onclick="saveChurch('${data.id}')">Salvar</button>
  </div>`;
}

async function saveChurch(id){
  if(profile.role !== 'admin') return alert("Sem permissão");

  const {error} = await client.from('churches')
    .update({name:cname.value})
    .eq('id',id);

  if(error){
    console.error(error);
    return alert("Erro ao salvar");
  }

  alert("Salvo");
}

// LOGOUT
async function logout(){
  await client.auth.signOut();
  location.reload();
}

init();
</script>
