<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ERP SaaS 2.0</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

.hidden { display: none; }

.layout {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 240px;
  background: #020617;
  padding: 16px;
  display: flex;
  flex-direction: column;
}

.menu button {
  width: 100%;
  background: none;
  border: none;
  color: #94a3b8;
  padding: 12px;
  border-radius: 8px;
  text-align: left;
  cursor: pointer;
}

.menu button:hover {
  background: #1e293b;
  color: white;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  height: 60px;
  background: #020617;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}

.content {
  flex: 1;
  padding: 16px;
  overflow: auto;
}

.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

.btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.btn-primary { background: #3b82f6; color: white; }

input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
  <h2>Login</h2>
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Senha" />
  <button id="btnLogin" class="btn btn-primary">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="layout hidden">

  <div class="sidebar">
    <h3 id="churchName">ERP</h3>

    <div class="menu">
      <button onclick="nav('dashboard')">📊 Dashboard</button>
      <button onclick="nav('products')">📦 Produtos</button>
      <button onclick="nav('users')">👥 Usuários</button>
    </div>

    <button onclick="logout()">Sair</button>
  </div>

  <div class="main">
    <div class="header">
      <div id="pageTitle"></div>
      <div id="userEmail"></div>
    </div>

    <div id="content" class="content"></div>
  </div>

</div>

<script>
const client = supabase.createClient(
  "https://lggbgqqnguoacuilbugm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZ2JncXFuZ3VvYWN1aWxidWdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzU3OTMsImV4cCI6MjA5MTQxMTc5M30.ma9mvlD4hZhXJheFbxEG5c9jvJahZ2_PAh2rWZnCa8k"
);

let user = null;
let profile = null;
let initialized = false;

/* LOGIN */
document.getElementById("btnLogin").onclick = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);

  await init();
};

/* INIT */
async function init() {
  if (initialized) return;
  initialized = true;

  const { data: session } = await client.auth.getSession();
  if (!session.session) return;

  const { data: u } = await client.auth.getUser();
  user = u.user;

  const { data: p, error } = await client
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  if (error || !p) {
    console.error(error);
    alert("Erro perfil (RLS?)");
    return;
  }

  profile = p;

  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("userEmail").innerText = user.email;

  nav("dashboard");
}

/* NAV */
function nav(page) {
  document.getElementById("pageTitle").innerText = page;

  if (page === "dashboard") dashboard();
  if (page === "products") products();
  if (page === "users") users();
}

/* DASHBOARD */
async function dashboard() {
  const { data } = await client.from("products").select("*");

  const list = data || [];
  const low = list.filter(p => p.quantity <= p.min_stock);

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Resumo</h3>
      Total produtos: ${list.length}<br/>
      Estoque baixo: ${low.length}
    </div>
  `;
}

/* PRODUCTS */
async function products() {
  const { data } = await client.from("products").select("*");

  const list = data || [];

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Novo Produto</h3>
      <input id="name" placeholder="Nome">
      <input id="qty" type="number" placeholder="Qtd">
      <button onclick="saveProduct()" class="btn btn-primary">Salvar</button>
    </div>

    <div class="card">
      ${list.map(p => `
        <div>${p.name} - ${p.quantity}</div>
      `).join("")}
    </div>
  `;
}

async function saveProduct() {
  const name = document.getElementById("name").value;
  const qty = parseInt(document.getElementById("qty").value || 0);

  await client.from("products").insert({
    name,
    quantity: qty,
    min_stock: 0,
    church_id: profile.church_id
  });

  products();
}

/* USERS (SAAS REAL) */
async function users() {
  if (profile.role !== "admin") {
    content.innerHTML = "<div class='card'>Sem permissão</div>";
    return;
  }

  const { data } = await client.from("profiles").select("*");

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Criar usuário</h3>

      <input id="u_email" placeholder="Email">
      <input id="u_password" type="password" placeholder="Senha">
      <input id="u_name" placeholder="Nome">

      <select id="u_role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>

      <button onclick="createUser()" class="btn btn-primary">
        Criar usuário
      </button>
    </div>

    <div class="card">
      <h3>Usuários</h3>
      ${data.map(u => `
        <div>${u.name || ''} - ${u.role}</div>
      `).join("")}
    </div>
  `;
}

/* CREATE USER VIA RPC */
async function createUser() {
  const email = document.getElementById("u_email").value;
  const password = document.getElementById("u_password").value;
  const name = document.getElementById("u_name").value;
  const role = document.getElementById("u_role").value;

  const { error } = await client.rpc("create_user_saas", {
    email,
    password,
    user_name: name,
    user_role: role,
    church: profile.church_id
  });

  if (error) {
    console.error(error);
    alert("Erro ao criar usuário");
    return;
  }

  alert("Usuário criado!");
  users();
}

/* LOGOUT */
async function logout() {
  await client.auth.signOut();
  location.reload();
}

/* AUTO INIT */
client.auth.onAuthStateChange((event) => {
  if (event === "SIGNED_IN") init();
});
</script>

</body>
</html>
